<h1 id="豆瓣"><a aria-hidden="true" class="anchor-heading" href="#豆瓣"><svg aria-hidden="true" viewBox="0 0 16 16"><use xlink:href="#svg-link"></use></svg></a>豆瓣</h1>
<p>豆瓣是中国网络平台中一个另类。</p>
<p>当然，豆瓣的沉默投票方式也触及了审查者的神经。由用户投票的电影评价方式，也成为了审查的对象。</p>
<p>2022年3月29日，豆瓣发布公告称，因业务调整，4月18日私密小组将全部停用，6月30日私密小组功能正式停止服务。在此之前，小组组长可提交申请将私密小组转为公开小组。</p>
